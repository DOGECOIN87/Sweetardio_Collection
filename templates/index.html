<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweetardio Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 0.95em;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 10px;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-number {
            font-size: 1.8em;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-label {
            font-size: 0.85em;
            color: #666;
            margin-top: 5px;
        }
        
        .image-container {
            text-align: center;
            margin-bottom: 30px;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        #generatedImage {
            max-width: 100%;
            max-height: 400px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        
        .character-name {
            margin-top: 15px;
            font-size: 1.2em;
            color: #333;
            font-weight: 600;
        }
        
        .loading {
            display: none;
            text-align: center;
            color: #667eea;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        
        button {
            padding: 12px 30px;
            font-size: 1em;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }
        
        #generateBtn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            flex: 1;
            max-width: 300px;
        }
        
        #generateBtn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        
        #generateBtn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        #downloadBtn {
            background: #4CAF50;
            color: white;
            display: none;
        }
        
        #downloadBtn:hover {
            background: #45a049;
            transform: translateY(-2px);
        }
        
        .error {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        
        .placeholder {
            color: #ccc;
            font-size: 1.1em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍬 Sweetardio Generator</h1>
        <p class="subtitle">Generate unique candy characters with random traits</p>
        
        <div class="stats" id="stats">
            <div class="stat-item">
                <div class="stat-number" id="charCount">-</div>
                <div class="stat-label">Characters</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="skinCount">-</div>
                <div class="stat-label">Skins</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="bgCount">-</div>
                <div class="stat-label">Backgrounds</div>
            </div>
        </div>
        
        <div class="error" id="error"></div>
        
        <div class="image-container">
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Generating your character...</p>
            </div>
            <div id="imageWrapper" style="display: none;">
                <img id="generatedImage" src="" alt="Generated character">
                <div class="character-name" id="characterName"></div>
            </div>
            <div class="placeholder" id="placeholder">Click "Generate" to create your first character!</div>
        </div>
        
        <div class="button-group">
            <button id="generateBtn">Generate Character</button>
            <button id="downloadBtn">Download</button>
        </div>
    </div>
    
    <script>
        let currentImageData = null;
        let currentImagePath = null;
        
        // Load stats on page load
        async function loadStats() {
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();
                document.getElementById('charCount').textContent = data.characters;
                document.getElementById('skinCount').textContent = data.skins;
                document.getElementById('bgCount').textContent = data.backgrounds;
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }
        
        // Generate character
        document.getElementById('generateBtn').addEventListener('click', async function() {
            const btn = this;
            btn.disabled = true;
            document.getElementById('loading').style.display = 'block';
            document.getElementById('placeholder').style.display = 'none';
            document.getElementById('imageWrapper').style.display = 'none';
            document.getElementById('error').style.display = 'none';
            
            try {
                const response = await fetch('/api/generate');
                const data = await response.json();
                
                if (data.success) {
                    currentImageData = data.image;
                    currentImagePath = data.output_path;
                    document.getElementById('generatedImage').src = data.image;
                    document.getElementById('characterName').textContent = `Character: ${data.character}`;
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('imageWrapper').style.display = 'block';
                    document.getElementById('downloadBtn').style.display = 'inline-block';
                } else {
                    throw new Error(data.error || 'Generation failed');
                }
            } catch (error) {
                document.getElementById('error').textContent = `Error: ${error.message}`;
                document.getElementById('error').style.display = 'block';
                document.getElementById('loading').style.display = 'none';
                document.getElementById('placeholder').style.display = 'block';
            } finally {
                btn.disabled = false;
            }
        });
        
        // Download image
        document.getElementById('downloadBtn').addEventListener('click', function() {
            if (currentImageData) {
                const link = document.createElement('a');
                link.href = currentImageData;
                link.download = `sweetardio_${Date.now()}.png`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }
        });
        
        // Load stats on page load
        loadStats();
    </script>
</body>
</html>
